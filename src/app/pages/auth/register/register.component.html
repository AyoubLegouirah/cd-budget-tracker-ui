<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">💰</div>
      <h1>Create account</h1>
      <p>Start tracking your budget today</p>
    </div>

    @if (success()) {
      <div class="alert alert-success">Account created! Redirecting to login…</div>
    } @else {
      <form class="auth-form" (ngSubmit)="submit()">
        @if (error()) {
          <div class="alert alert-error">{{ error() }}</div>
        }

        <div class="form-row">
          <div class="form-group">
            <label for="firstName">First name</label>
            <input id="firstName" type="text" [(ngModel)]="firstName" name="firstName" placeholder="John" />
          </div>
          <div class="form-group">
            <label for="lastName">Last name</label>
            <input id="lastName" type="text" [(ngModel)]="lastName" name="lastName" placeholder="Doe" />
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="••••••••" />
        </div>

        <button type="submit" class="btn-primary" [disabled]="loading()">
          {{ loading() ? 'Creating account…' : 'Create account' }}
        </button>
      </form>

      <p class="auth-footer">
        Already have an account? <a routerLink="/login">Sign in</a>
      </p>
    }
  </div>
</div>
